<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery 🌲💚</title>
<link rel="icon" type="image/png" href="image/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Kanit',sans-serif;
}

body{
  min-height:100vh;
  background:
    linear-gradient(rgba(10,20,15,0.75), rgba(0,0,0,0.92)),
    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRRdI1ol4z9LxJ0_ghDMSz8WJfs8fyGaHO3g&s');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;  /* 🔥 ล็อกพื้นหลัง */
  background-repeat:no-repeat;
  color:#e8f5e9;
  overflow-x:hidden;
  padding:40px 20px;
}

/* 🌿 ใบไม้ร่วง */
.leaf{
  position:fixed;
  top:-10%;
  width:14px;
  height:14px;
  background:rgba(139,195,74,0.8);
  border-radius:50% 0 50% 0;
  pointer-events:none;
  z-index:1;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{
    transform:translateY(0) rotate(0deg);
    opacity:0;
  }
  10%{opacity:1;}
  100%{
    transform:translateY(110vh) rotate(360deg);
    opacity:0;
  }
}

/* header */
.header{
  text-align:center;
  margin-bottom:40px;
  position:relative;
  z-index:2;
}

.header h1{
  font-size:52px;
  color:#c8e6c9;
}

.header p{
  color:#a5d6a7;
  margin-top:10px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1100px;
  margin:auto;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(40,60,40,0.55);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.img{
  width:100%;
  display:block;
}

.content{
  padding:15px;
}

/* buttons */
.btns{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:50px;
  position:relative;
  z-index:2;
}

.btn{
  padding:12px 26px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2e7d32,#004d40);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.lightbox img{
  max-width:100%;
  max-height:100%;
  transition:0.3s;
}

.topbar{
  position:absolute;
  top:15px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  color:white;
  font-size:18px;
}

.close{
  font-size:35px;
  cursor:pointer;
}

.nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:50px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

.left{ left:10px; }
.right{ right:10px; }

.rain {
  position: fixed;
  top: -20vh;
  width: 2px;
  height: 20px;
  background: rgba(174, 194, 224, 0.6);
  z-index: 1;
  pointer-events: none;
  animation: rainFall linear forwards;
}

@keyframes rainFall {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(120vh);
  }
}

</style>
</head>

<body>

<div class="header">
  <h1>🌲 Memory Gallery 💚</h1>
  <p>ทุกช่วงเวลาถูกเก็บไว้ในป่านี้</p>
</div>

<div class="grid" id="gallery"></div>

<div class="btns">
  <a class="btn" href="countdown.html">⬅️ ย้อนกลับ</a>
  <a class="btn" href="final.html">ถัดไป 💌</a>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <div class="topbar">
    <span id="counter"></span>
    <span class="close" onclick="closeLightbox()">×</span>
  </div>

  <button class="nav left">❮</button>
  <img id="lightboxImg">
  <button class="nav right">❯</button>
</div>

<script>

const gallery = document.getElementById("gallery");

let images = [];

// 🌐 auto base path (สำคัญมาก)
const base =
  location.hostname === "localhost" || location.hostname === "127.0.0.1"
    ? ""
    : "/krobrob-8-duean";

// 📸 helper สร้างรูป
function addRange(start, end, folder = `${base}/image/`) {
  for (let i = start; i >= end; i--) {
    const path = `${folder}${i}_0.jpg`;
    images.push(path);
  }
}

// 🔥 ช่วงรูปของคุณ
addRange(19036, 18990);
addRange(19290, 19271);

// 🖼️ render gallery
images.forEach((src, index) => {
  let card = document.createElement("div");
  card.className = "card";

  let img = document.createElement("img");
  img.className = "img";
  img.src = src;

  img.onclick = () => openLightbox(index);

  let content = document.createElement("div");
  content.className = "content";
  content.innerHTML = `<h3>Memory ${index + 1}</h3>`;

  card.appendChild(img);
  card.appendChild(content);
  gallery.appendChild(card);
});

// ===== LIGHTBOX =====
let currentIndex = 0;
let zoom = 1;

function openLightbox(index){
  currentIndex = index;
  document.getElementById("lightbox").style.display = "flex";
  showImage();
}

function showImage(){
  const img = document.getElementById("lightboxImg");
  img.src = images[currentIndex];

  document.getElementById("counter").innerText =
    `${currentIndex + 1} / ${images.length}`;

  zoom = 1;
  img.style.transform = "scale(1)";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}

function nextImg(){
  currentIndex = (currentIndex + 1) % images.length;
  showImage();
}

function prevImg(){
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  showImage();
}

// swipe + zoom
document.addEventListener("DOMContentLoaded", () => {
  const img = document.getElementById("lightboxImg");

  let startX = 0;

  img.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  img.addEventListener("touchend", e => {
    let diff = startX - e.changedTouches[0].clientX;

    if (Math.abs(diff) > 50) {
      diff > 0 ? nextImg() : prevImg();
    }
  });

  img.addEventListener("click", () => {
    zoom = zoom === 1 ? 2 : 1;
    img.style.transform = `scale(${zoom})`;
  });

  document.querySelector(".left").onclick = prevImg;
  document.querySelector(".right").onclick = nextImg;
});

function createLeaf(){
  const leaf = document.createElement("div");
  leaf.classList.add("leaf");

  leaf.style.left = Math.random() * 100 + "vw";
  leaf.style.animationDuration = (4 + Math.random() * 5) + "s";
  leaf.style.opacity = Math.random();
  leaf.style.transform = `rotate(${Math.random()*360}deg)`;

  document.body.appendChild(leaf);

  setTimeout(() => {
    leaf.remove();
  }, 9000);
}

setInterval(createLeaf, 250);

// 🌧️ ฝนตก
function createRain(){
  const rain = document.createElement("div");
  rain.classList.add("rain");

  rain.style.left = Math.random() * 100 + "vw";

  const duration = 0.5 + Math.random() * 0.7;

  rain.style.animationDuration = duration + "s";
  rain.style.opacity = Math.random();

  document.body.appendChild(rain);

  setTimeout(() => {
    rain.remove();
  }, duration * 1000);
}

setInterval(createRain, 60);

</script>

</body>
</html>
